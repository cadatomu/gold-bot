version: "3.9"

networks:
  goldnet:
    driver: bridge

services:

  # ── IB Gateway (headless, auto-login via IBC) ────────────────────────────────
  # Paper trading port: 4002
  # VNC debug port: 5900 (password: ver VNC_PASSWORD en .env)
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    container_name: ib-gateway
    restart: always                    # reinicia en crash y en reboot del VPS
    networks:
      - goldnet
    environment:
      - TWS_USERID=${IB_USERNAME}
      - TWS_PASSWORD=${IB_PASSWORD}
      - TRADING_MODE=paper             # paper | live
      - VNC_SERVER_PASSWORD=${VNC_PASSWORD:-GoldVNC2024}
      - TWOFA_TIMEOUT_ACTION=restart   # reintentar login si 2FA expira
      - READ_ONLY_API=no
    ports:
      - "4002:4002"   # API paper — goldbot conecta aquí
      - "5900:5900"   # VNC para debug remoto
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/4002' 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 120s

  # ── GoldBot ──────────────────────────────────────────────────────────────────
  goldbot:
    build: .
    container_name: goldbot
    restart: always
    depends_on:
      ib-gateway:
        condition: service_healthy
    # host networking: goldbot accede a ib-gateway via 127.0.0.1:4002
    # IB Gateway solo acepta localhost — esto evita el rechazo por IP foránea
    network_mode: host
    env_file: .env
    environment:
      - IB_HOST=127.0.0.1
      - IB_PORT=4002
      - PYTHONUNBUFFERED=1
      - TZ=UTC
    volumes:
      - ./data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
